<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Holding Office</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg: #0f0f13;
  --bg2: #16161d;
  --bg3: #1c1c26;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0f5;
  --text2: #8888aa;
  --text3: #55556a;
  --blue: #4f8ef7;
  --blue2: #1a3a7a;
  --blue3: #0d2050;
  --green: #2ecc8a;
  --green2: #0d3d26;
  --amber: #f5a623;
  --amber2: #3d2800;
  --red: #e05555;
  --red2: #3d1010;
  --purple: #9b6ff7;
  --radius: 12px;
  --radius-sm: 8px;
  --font: 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); }

.app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
.topbar { display: flex; align-items: center; height: 52px; border-bottom: 0.5px solid var(--border); background: var(--bg); flex-shrink: 0; padding: 0 4px 0 0; }
.logo { display: flex; align-items: center; gap: 9px; padding: 0 14px; height: 100%; border-right: 0.5px solid var(--border); flex-shrink: 0; }
.logo-icon { width: 30px; height: 30px; border-radius: 8px; background: var(--blue3); border: 0.5px solid var(--blue2); display: flex; align-items: center; justify-content: center; font-size: 16px; }
.logo-text { font-size: 13px; font-weight: 600; letter-spacing: -0.02em; color: var(--text); }
.tabs { display: flex; flex: 1; height: 100%; overflow-x: auto; padding: 0 4px; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { display: flex; align-items: center; gap: 5px; padding: 0 11px; height: 100%; font-size: 12px; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all .15s; flex-shrink: 0; }
.tab:hover { color: var(--text2); }
.tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 500; }
.tab svg { width: 15px; height: 15px; }
.topbar-actions { padding: 0 10px; display: flex; align-items: center; gap: 7px; }
.tbtn { display: flex; align-items: center; gap: 5px; padding: 6px 11px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--bg2); cursor: pointer; font-size: 12px; color: var(--text2); white-space: nowrap; transition: all .15s; font-family: var(--font); }
.tbtn:hover { background: var(--bg3); color: var(--text); }
.tbtn.pri { background: var(--blue3); border-color: var(--blue2); color: var(--blue); font-weight: 500; }
.tbtn.pri:hover { background: var(--blue2); }
.body { display: flex; flex: 1; overflow: hidden; }

.sidebar { width: 185px; border-right: 0.5px solid var(--border); display: flex; flex-direction: column; background: var(--bg); flex-shrink: 0; overflow-y: auto; scrollbar-width: none; }
.sidebar::-webkit-scrollbar { display: none; }
.sb-sec { padding: 12px 12px 4px; font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .1em; }
.emp-row { display: flex; align-items: center; gap: 8px; padding: 6px 10px; cursor: pointer; border-radius: var(--radius-sm); margin: 1px 4px; transition: background .15s; }
.emp-row:hover { background: var(--bg2); }
.av { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; position: relative; }
.lv-badge { position: absolute; bottom: -2px; right: -2px; width: 14px; height: 14px; border-radius: 50%; background: var(--blue); color: #fff; font-size: 8px; font-weight: 700; display: flex; align-items: center; justify-content: center; border: 1.5px solid var(--bg); }
.en { font-size: 12px; font-weight: 500; color: var(--text); }
.er { font-size: 10px; color: var(--text3); }
.xp-mini { height: 2px; border-radius: 1px; background: var(--bg3); margin-top: 3px; overflow: hidden; }
.xp-mini-fill { height: 100%; border-radius: 1px; background: var(--blue); transition: width .4s; }
.sep { height: 0.5px; background: var(--border); margin: 5px 10px; }

.content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.page { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.page.show { display: flex; }
.page-header { padding: 10px 16px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; background: var(--bg); }
.page-title { font-size: 13px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 7px; }
.page-title span { color: var(--text3); font-size: 15px; }

.msgs { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; scrollbar-width: thin; scrollbar-color: var(--bg3) transparent; }
.mrow { display: flex; gap: 9px; align-items: flex-start; }
.mrow.you { flex-direction: row-reverse; }
.mav { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; margin-top: 1px; }
.mbody { max-width: 74%; }
.msender { font-size: 10px; color: var(--text3); margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
.mrow.you .msender { justify-content: flex-end; }
.lv-tag { font-size: 9px; padding: 1px 5px; border-radius: 5px; background: var(--blue3); color: var(--blue); font-weight: 600; }
.bub { padding: 9px 13px; border-radius: var(--radius); font-size: 13px; line-height: 1.55; color: var(--text); border: 0.5px solid var(--border); }
.bub.them { background: var(--bg2); border-bottom-left-radius: 3px; }
.bub.you { background: var(--blue3); border-color: var(--blue2); color: #c8dbff; border-bottom-right-radius: 3px; }
.bub.int { background: var(--amber2); border-color: rgba(245,166,35,0.2); border-bottom-left-radius: 3px; }
.bub.learn { background: var(--green2); border-color: rgba(46,204,138,0.2); border-bottom-left-radius: 3px; }
.bub pre { font-family: 'Menlo', 'Monaco', monospace; font-size: 11px; background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 8px; margin-top: 6px; white-space: pre-wrap; overflow-x: auto; }
.itag { font-size: 10px; color: var(--amber); margin-bottom: 3px; display: flex; align-items: center; gap: 4px; }
.ltag { font-size: 10px; color: var(--green); margin-bottom: 3px; display: flex; align-items: center; gap: 4px; }
.trow { display: flex; gap: 9px; align-items: center; }
.tbub { padding: 7px 11px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); display: flex; gap: 5px; align-items: center; }
.td { width: 5px; height: 5px; border-radius: 50%; background: var(--text3); animation: bop 1.2s infinite; }
.td:nth-child(2) { animation-delay: .2s; } .td:nth-child(3) { animation-delay: .4s; }
@keyframes bop { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-4px)} }
.sysmsg { text-align: center; font-size: 11px; color: var(--text3); padding: 3px 0; }
.levelmsg { text-align: center; font-size: 12px; font-weight: 500; color: var(--green); padding: 7px 14px; background: var(--green2); border-radius: var(--radius-sm); border: 0.5px solid rgba(46,204,138,0.2); }
.inpbar { padding: 10px 12px; border-top: 0.5px solid var(--border); display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; background: var(--bg); }
.inpbar textarea { flex: 1; border: 0.5px solid var(--border2); border-radius: 20px; padding: 8px 14px; font-size: 13px; font-family: var(--font); resize: none; min-height: 36px; max-height: 90px; background: var(--bg2); color: var(--text); outline: none; line-height: 1.4; transition: border-color .15s; }
.inpbar textarea:focus { border-color: var(--blue); }
.inpbar textarea::placeholder { color: var(--text3); }
.sbtn { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--blue); cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; flex-shrink: 0; transition: background .15s; }
.sbtn:hover { background: #3a7ee0; }
.sbtn:disabled { opacity: .35; cursor: not-allowed; }

.staff-wrap { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; scrollbar-width: thin; scrollbar-color: var(--bg3) transparent; }
.scard { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; transition: border-color .15s; }
.scard:hover { border-color: var(--border2); }
.scard-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.sav-big { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; position: relative; }
.lv-badge-big { position: absolute; bottom: -2px; right: -2px; width: 18px; height: 18px; border-radius: 50%; background: var(--blue); color: #fff; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; border: 2px solid var(--bg2); }
.sname { font-size: 14px; font-weight: 600; color: var(--text); }
.srole { font-size: 12px; color: var(--text2); margin-top: 1px; }
.sdept { font-size: 10px; padding: 2px 8px; border-radius: 6px; background: var(--bg3); color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-top: 4px; display: inline-block; }
.xp-bar-wrap { margin: 10px 0 6px; }
.xp-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.xp-bar { height: 4px; border-radius: 2px; background: var(--bg3); overflow: hidden; }
.xp-fill { height: 100%; border-radius: 2px; background: var(--blue); transition: width .5s; }
.skills-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.skill-tag { font-size: 11px; padding: 3px 9px; border-radius: 6px; background: var(--bg3); color: var(--text3); border: 0.5px solid var(--border); }
.skill-tag.learned { background: var(--blue3); color: var(--blue); border-color: var(--blue2); }
.knowledge-list { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
.know-item { font-size: 11px; color: var(--text2); padding: 6px 10px; background: var(--bg3); border-radius: var(--radius-sm); display: flex; align-items: flex-start; gap: 7px; line-height: 1.4; }
.teach-btn { display: flex; align-items: center; gap: 5px; padding: 7px 13px; border-radius: var(--radius-sm); border: 0.5px solid rgba(46,204,138,0.25); background: var(--green2); color: var(--green); font-size: 12px; font-weight: 500; cursor: pointer; transition: background .15s; margin-top: 10px; font-family: var(--font); }
.teach-btn:hover { background: rgba(46,204,138,0.15); }

.config-screen { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
.config-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 28px; width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 14px; }
.config-logo { font-size: 32px; text-align: center; }
.config-title { font-size: 17px; font-weight: 600; color: var(--text); text-align: center; letter-spacing: -.02em; }
.config-sub { font-size: 13px; color: var(--text2); text-align: center; line-height: 1.5; }
.cfg-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 5px; }
.cfg-input { width: 100%; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 13px; font-size: 13px; font-family: var(--font); color: var(--text); outline: none; transition: border-color .15s; }
.cfg-input:focus { border-color: var(--blue); }
.cfg-input::placeholder { color: var(--text3); }
.cfg-btn { width: 100%; padding: 11px; border-radius: var(--radius-sm); border: none; background: var(--blue); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: background .15s; margin-top: 4px; }
.cfg-btn:hover { background: #3a7ee0; }
.cfg-hint { font-size: 11px; color: var(--text3); text-align: center; line-height: 1.5; }
.cfg-hint a { color: var(--blue); text-decoration: none; }

.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 50; align-items: flex-end; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius) var(--radius) 0 0; padding: 20px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
.modal-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--bg3); margin: 0 auto 16px; }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.modal-header h3 { font-size: 15px; font-weight: 600; color: var(--text); }
.modal-close { width: 28px; height: 28px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--bg3); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 16px; font-family: var(--font); }
.fld { margin-top: 12px; }
.fld label { font-size: 11px; color: var(--text3); display: block; margin-bottom: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; }
.fld input, .fld textarea, .fld select { width: 100%; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 9px 12px; font-size: 13px; font-family: var(--font); background: var(--bg3); color: var(--text); outline: none; transition: all .15s; }
.fld input:focus, .fld textarea:focus { border-color: var(--blue); }
.fld textarea { resize: vertical; min-height: 80px; }
.fld select { appearance: none; }
.mbtns { display: flex; gap: 8px; margin-top: 18px; }
.mbtn { flex: 1; padding: 10px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--bg3); cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text2); font-family: var(--font); transition: all .15s; }
.mbtn:hover { background: var(--bg); color: var(--text); }
.mbtn.green { background: var(--green2); border-color: rgba(46,204,138,0.25); color: var(--green); }
.mbtn.green:hover { background: rgba(46,204,138,0.15); }
.mbtn.blue { background: var(--blue3); border-color: var(--blue2); color: var(--blue); }
.mbtn.blue:hover { background: var(--blue2); }
</style>
</head>
<body>

<div class="app" id="app" style="display:none">
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">🏢</div>
      <span class="logo-text">Холдинг</span>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('chat')" id="t-chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> Чат
      </div>
      <div class="tab" onclick="switchTab('staff')" id="t-staff">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Команда
      </div>
    </div>
    <div class="topbar-actions">
      <button class="tbtn" onclick="resetState()" title="Сбросить прогресс">↺</button>
      <button class="tbtn" onclick="openModal('modalTeach')">📚 Обучить</button>
      <button class="tbtn pri" onclick="openModal('modalHire')">+ Нанять</button>
    </div>
  </div>
  <div class="body">
    <div class="sidebar" id="sidebar"></div>
    <div class="content">
      <div class="page show" id="p-chat">
        <div class="page-header">
          <div class="page-title"><span>#</span> общий-чат</div>
          <span style="font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px">
            <span style="width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block"></span> все онлайн
          </span>
        </div>
        <div class="msgs" id="msgs"></div>
        <div class="inpbar">
          <textarea id="inp" placeholder="Поставьте задачу команде..." rows="1" onkeydown="handleKey(event)" oninput="autoH(this)"></textarea>
          <button class="sbtn" id="sBtn" onclick="sendMsg()">↑</button>
        </div>
      </div>
      <div class="page" id="p-staff">
        <div class="page-header">
          <div class="page-title"><span>👥</span> команда и развитие</div>
        </div>
        <div class="staff-wrap" id="staffWrap"></div>
      </div>
    </div>
  </div>
</div>

<!-- CONFIG SCREEN -->
<div id="configScreen" class="app">
  <div class="config-screen">
    <div class="config-card">
      <div class="config-logo">🏢</div>
      <div class="config-title">AI Holding Office</div>
      <div class="config-sub">Введите API-ключ Anthropic для запуска ИИ-сотрудников</div>
      <div>
        <div class="cfg-label">Anthropic API Key</div>
        <input class="cfg-input" type="password" id="apiKeyInput" placeholder="sk-ant-api03-...">
      </div>
      <button class="cfg-btn" onclick="saveApiKey()">Запустить офис →</button>
      <div class="cfg-hint">
        Получить ключ: <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a><br>
        Ключ сохраняется локально и нигде не передаётся
      </div>
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-bg" id="modalHire">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header"><h3>Нанять сотрудника</h3><button class="modal-close" onclick="closeModal('modalHire')">✕</button></div>
    <div class="fld"><label>Имя</label><input type="text" id="hName" placeholder="Артём"></div>
    <div class="fld"><label>Должность</label><input type="text" id="hRole" placeholder="Таргетолог"></div>
    <div class="fld"><label>Отдел</label><input type="text" id="hDept" placeholder="Маркетинг"></div>
    <div class="fld"><label>Эмодзи</label><input type="text" id="hEmoji" placeholder="🎯" maxlength="2" style="width:56px"></div>
    <div class="fld"><label>Навыки (через запятую)</label><input type="text" id="hSkills" placeholder="Telegram Ads, таргет"></div>
    <div class="fld"><label>Инструкции</label><textarea id="hDesc" placeholder="Ты — Артём, таргетолог холдинга..."></textarea></div>
    <div class="mbtns"><button class="mbtn" onclick="closeModal('modalHire')">Отмена</button><button class="mbtn blue" onclick="hireEmp()">Нанять</button></div>
  </div>
</div>

<div class="modal-bg" id="modalTeach">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header"><h3>Обучить сотрудника</h3><button class="modal-close" onclick="closeModal('modalTeach')">✕</button></div>
    <div class="fld"><label>Сотрудник</label><select id="teachEmp" style="width:100%"></select></div>
    <div class="fld"><label>Тема обучения</label><input type="text" id="teachTopic" placeholder="Работа с возражениями"></div>
    <div class="fld"><label>Материал</label><textarea id="teachContent" placeholder="Скрипт, инструкция, кейс..." style="min-height:110px"></textarea></div>
    <div class="mbtns"><button class="mbtn" onclick="closeModal('modalTeach')">Отмена</button><button class="mbtn green" onclick="teachEmployee()">Обучить</button></div>
  </div>
</div>

<div class="modal-bg" id="modalTeachCard">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header"><h3 id="teachCardTitle">Обучить</h3><button class="modal-close" onclick="closeModal('modalTeachCard')">✕</button></div>
    <div class="fld"><label>Тема</label><input type="text" id="teachCardTopic" placeholder="Тема обучения"></div>
    <div class="fld"><label>Материал</label><textarea id="teachCardContent" placeholder="Скрипт, инструкция, кейс..." style="min-height:110px"></textarea></div>
    <div class="mbtns"><button class="mbtn" onclick="closeModal('modalTeachCard')">Отмена</button><button class="mbtn green" onclick="teachFromCard()">Обучить</button></div>
  </div>
</div>

<script>
let API_KEY = localStorage.getItem('holding_api_key') || '';

function saveApiKey() {
  const k = document.getElementById('apiKeyInput').value.trim();
  if (!k.startsWith('sk-')) { alert('Введите корректный ключ (начинается с sk-)'); return; }
  API_KEY = k;
  localStorage.setItem('holding_api_key', k);
  document.getElementById('configScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  init();
}

if (API_KEY) {
  document.getElementById('configScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}

if (window.Telegram && window.Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

const COLORS = [
  {bg:'#1a2a3a',tc:'#4f8ef7'},{bg:'#0d3a26',tc:'#2ecc8a'},
  {bg:'#3a2800',tc:'#f5a623'},{bg:'#2a1a3a',tc:'#9b6ff7'},
  {bg:'#3a1a2a',tc:'#f06292'},{bg:'#1a3a1a',tc:'#66bb6a'},
  {bg:'#2a2a1a',tc:'#d4e157'},{bg:'#3a1a1a',tc:'#ef5350'}
];
const gc = id => COLORS[id % COLORS.length];
const XP_PER_LEVEL = 5;
const LEVELS = ['Новичок','Стажёр','Специалист','Эксперт','Мастер'];
function getLevelInfo(xp) {
  const lv = Math.min(Math.floor(xp / XP_PER_LEVEL), LEVELS.length - 1);
  return { lv: lv+1, name: LEVELS[lv], progress: ((xp % XP_PER_LEVEL) / XP_PER_LEVEL) * 100, xp };
}

const employees = [
  {id:0,name:'Игорь',role:'Генеральный директор',dept:'Управление',emoji:'🏢',xp:8,baseSkills:['стратегия','координация','планирование'],learnedSkills:[],knowledge:[],baseSystem:`Ты — Игорь, CEO холдинга по раскрутке Telegram-каналов и продажам техники/одежды. Распределяй задачи между: Рита(контент), Кирилл(автоматизация), Даша(продажи одежда), Толя(продажи техника), Зина(заказы), Вова(боты), Настя(реклама), Лёша(аналитика). Говори чётко, как CEO. До 150 слов.`},
  {id:1,name:'Рита',role:'Контент-директор',dept:'Контент',emoji:'✍️',xp:6,baseSkills:['посты','контент-план','копирайтинг'],learnedSkills:[],knowledge:[],baseSystem:`Ты — Рита, контент-директор. Пишешь посты, контент-планы, описания товаров для Telegram-каналов. Если просят пост — пиши готовый. До 150 слов.`},
  {id:2,name:'Кирилл',role:'SMM-автоматизация',dept:'Автоматизация',emoji:'⚙️',xp:4,baseSkills:['n8n','Make','Telegram API','автопостинг'],learnedSkills:[],knowledge:[],baseSystem:`Ты — Кирилл, автоматизация SMM. Настраиваешь автопостинг, n8n/Make/Python. Описывай схемы: триггер→действие→результат. До 150 слов.`},
  {id:3,name:'Даша',role:'Менеджер продаж — одежда',dept:'Продажи',emoji:'👗',xp:5,baseSkills:['скрипты продаж','возражения','апсейл'],learnedSkills:[],knowledge:[],baseSystem:`Ты — Даша, продажи одежды через Telegram. Обрабатываешь заявки, делаешь апсейлы, составляешь скрипты. Координируй с Зиной. До 150 слов.`},
  {id:4,name:'Толя',role:'Менеджер продаж — техника',dept:'Продажи',emoji:'📱',xp:5,baseSkills:['техника','смартфоны','скрипты'],learnedSkills:[],knowledge:[],baseSystem:`Ты — Толя, продажи техники через Telegram. Консультируешь, сравниваешь модели, закрываешь сделки. Координируй с Зиной. До 150 слов.`},
  {id:5,name:'Зина',role:'Руководитель отдела заказов',dept:'Операции',emoji:'📦',xp:7,baseSkills:['CRM','заказы','логистика','регламенты'],learnedSkills:[],knowledge:[],baseSystem:`Ты — Зина, руководитель отдела заказов. Управляешь потоком заказов, составляешь регламенты и CRM-структуры. До 150 слов.`},
  {id:6,name:'Вова',role:'Разработчик ботов',dept:'Автоматизация',emoji:'🤖',xp:4,baseSkills:['aiogram','Python','Telegram Bot API'],learnedSkills:[],knowledge:[],baseSystem:`Ты — Вова, разработчик Telegram-ботов. Создаёшь боты для заказов, уведомлений, автоответов. Давай конкретную архитектуру. До 150 слов.`},
  {id:7,name:'Настя',role:'Трафик-менеджер',dept:'Маркетинг',emoji:'📣',xp:5,baseSkills:['Telegram Ads','посевы','ВП','медиаплан'],learnedSkills:[],knowledge:[],baseSystem:`Ты — Настя, трафик-менеджер. Привлекаешь подписчиков через Telegram Ads, посевы, ВП. Считаешь CPM/CPS, строишь медиапланы. До 150 слов.`},
  {id:8,name:'Лёша',role:'Аналитик',dept:'Аналитика',emoji:'📊',xp:6,baseSkills:['Tgstat','Telemetr','ROI','отчёты'],learnedSkills:[],knowledge:[],baseSystem:`Ты — Лёша, аналитик. Считаешь метрики каналов, конверсии, ROI. Строишь отчёты и дашборды. До 150 слов.`},
];

const deptOrder = ['Управление','Контент','Маркетинг','Продажи','Операции','Автоматизация','Аналитика'];
let chatHistory = [], busy = false, teachTarget = null;

// ── PERSISTENCE ─────────────────────────────────────────
const SAVE_KEY = 'holding_employees_v2';

function saveState() {
  // Save only mutable fields — baseSystem stays in code
  const data = employees.map(e => ({
    id: e.id,
    xp: e.xp,
    learnedSkills: e.learnedSkills,
    knowledge: e.knowledge,
    // For custom-hired employees, save all fields
    _custom: e._custom || false,
    name: e._custom ? e.name : undefined,
    role: e._custom ? e.role : undefined,
    dept: e._custom ? e.dept : undefined,
    emoji: e._custom ? e.emoji : undefined,
    baseSkills: e._custom ? e.baseSkills : undefined,
    baseSystem: e._custom ? e.baseSystem : undefined,
  }));
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
}

function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    saved.forEach(s => {
      if (s._custom) {
        // Restore custom-hired employee if not already in array
        if (!employees.find(e => e.id === s.id)) {
          employees.push({
            id: s.id, name: s.name, role: s.role, dept: s.dept,
            emoji: s.emoji, xp: s.xp, baseSkills: s.baseSkills,
            learnedSkills: s.learnedSkills, knowledge: s.knowledge,
            baseSystem: s.baseSystem, _custom: true
          });
        }
      } else {
        const emp = employees.find(e => e.id === s.id);
        if (emp) {
          emp.xp = s.xp || 0;
          emp.learnedSkills = s.learnedSkills || [];
          emp.knowledge = s.knowledge || [];
        }
      }
    });
  } catch(e) { console.warn('State load error', e); }
}

loadState();

function buildSystem(emp) {
  const li = getLevelInfo(emp.xp);
  let sys = emp.baseSystem;
  sys += `\n\nТвой уровень: ${li.name} (${li.lv}).`;
  if (li.lv >= 3) sys += ' Развёрнутые ответы.';
  if (li.lv >= 4) sys += ' Нестандартные решения, указывай риски.';
  if (li.lv >= 5) sys += ' Стратегические инсайты.';
  if (emp.knowledge.length > 0) {
    sys += '\n\nТвои знания:\n';
    emp.knowledge.forEach(k => { sys += `— ${k.topic}: ${k.content}\n`; });
  }
  if (emp.learnedSkills.length > 0) sys += `\nДоп. навыки: ${emp.learnedSkills.join(', ')}.`;
  return sys;
}

function gainXP(emp, amount = 1) {
  const before = getLevelInfo(emp.xp);
  emp.xp += amount;
  const after = getLevelInfo(emp.xp);
  renderSidebar();
  if (after.lv > before.lv) addLevelUp(emp, after);
  saveState();
}

function addLevelUp(emp, li) {
  const d = document.createElement('div');
  d.className = 'levelmsg';
  d.textContent = `⭐ ${emp.name} достиг уровня ${li.lv} — ${li.name}!`;
  document.getElementById('msgs').appendChild(d);
  scrollDown();
}

function renderSidebar() {
  const byDept = {};
  employees.forEach(e => { const d = e.dept||'Другое'; if(!byDept[d]) byDept[d]=[]; byDept[d].push(e); });
  const all = [...deptOrder, ...Object.keys(byDept).filter(d=>!deptOrder.includes(d))];
  let h = '';
  all.forEach(dept => {
    if (!byDept[dept]) return;
    h += `<div class="sb-sec">${dept}</div>`;
    byDept[dept].forEach(e => {
      const c = gc(e.id); const li = getLevelInfo(e.xp);
      h += `<div class="emp-row" onclick="switchTab('staff')">
        <div class="av" style="background:${c.bg};color:${c.tc}">${e.emoji}<div class="lv-badge">${li.lv}</div></div>
        <div style="flex:1;min-width:0">
          <div class="en">${e.name}</div><div class="er">${e.role}</div>
          <div class="xp-mini"><div class="xp-mini-fill" style="width:${Math.round(li.progress)}%"></div></div>
        </div>
      </div>`;
    });
    h += `<div class="sep"></div>`;
  });
  document.getElementById('sidebar').innerHTML = h;
}

function renderStaff() {
  document.getElementById('staffWrap').innerHTML = employees.map(e => {
    const c = gc(e.id); const li = getLevelInfo(e.xp);
    const allSkills = [...e.baseSkills, ...e.learnedSkills];
    const knowHtml = e.knowledge.length > 0
      ? `<div class="knowledge-list">${e.knowledge.map(k=>`<div class="know-item">📖 <span><strong>${k.topic}:</strong> ${k.content.slice(0,80)}${k.content.length>80?'...':''}</span></div>`).join('')}</div>` : '';
    return `<div class="scard">
      <div class="scard-top">
        <div class="sav-big" style="background:${c.bg};color:${c.tc}">${e.emoji}<div class="lv-badge-big">${li.lv}</div></div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div><div class="sname">${e.name}</div><div class="srole">${e.role}</div></div>
            <div style="text-align:right"><div style="font-size:13px;font-weight:600;color:var(--blue)">${li.name}</div><div style="font-size:10px;color:var(--text3)">${e.xp} XP · ур. ${li.lv}</div></div>
          </div>
          <div class="sdept" style="margin-top:6px">${e.dept}</div>
        </div>
      </div>
      <div class="xp-bar-wrap">
        <div class="xp-label"><span>До уровня ${li.lv < 5 ? li.lv+1 : 'макс'}</span><span>${Math.round(li.progress)}%</span></div>
        <div class="xp-bar"><div class="xp-fill" style="width:${Math.round(li.progress)}%"></div></div>
      </div>
      <div class="skills-row">${allSkills.map(s=>`<span class="skill-tag ${e.learnedSkills.includes(s)?'learned':''}">${s}</span>`).join('')}</div>
      ${knowHtml}
      <button class="teach-btn" onclick="openTeachCard(${e.id})">📚 Обучить ${e.name}</button>
    </div>`;
  }).join('');
}

function switchTab(name) {
  ['chat','staff'].forEach(t => {
    document.getElementById('p-'+t).classList.toggle('show', t===name);
    document.getElementById('t-'+t).classList.toggle('active', t===name);
  });
  if (name === 'staff') renderStaff();
}

function addSys(text) {
  const d = document.createElement('div'); d.className = 'sysmsg'; d.textContent = text;
  document.getElementById('msgs').appendChild(d); scrollDown();
}
function addBub(emp, text, type='them') {
  const c = gc(emp.id); const li = getLevelInfo(emp.xp); const box = document.getElementById('msgs');
  const row = document.createElement('div'); row.className = 'mrow';
  const tag = type==='int' ? `<div class="itag">🔗 внутри команды</div>` : type==='learn' ? `<div class="ltag">📚 применяет знания</div>` : '';
  row.innerHTML = `<div class="mav" style="background:${c.bg};color:${c.tc}">${emp.emoji}</div>
    <div class="mbody">
      <div class="msender">${emp.name} · ${emp.role} <span class="lv-tag">ур.${li.lv} ${li.name}</span></div>
      ${tag}<div class="bub ${type==='int'?'int':type==='learn'?'learn':'them'}">${fmt(text)}</div>
    </div>`;
  box.appendChild(row); scrollDown();
}
function addYou(text) {
  const box = document.getElementById('msgs'); const row = document.createElement('div'); row.className = 'mrow you';
  row.innerHTML = `<div class="mav" style="background:var(--blue3);color:var(--blue);font-size:9px;font-weight:700">ВЫ</div>
    <div class="mbody"><div class="msender" style="text-align:right">Вы · Владелец</div><div class="bub you">${fmt(text)}</div></div>`;
  box.appendChild(row); scrollDown();
}
function showTyping(emp) {
  const c = gc(emp.id); const box = document.getElementById('msgs');
  const row = document.createElement('div'); row.className = 'trow'; row.id = 'tp-'+emp.id;
  row.innerHTML = `<div class="mav" style="background:${c.bg};color:${c.tc}">${emp.emoji}</div>
    <div style="font-size:10px;color:var(--text3);margin-right:4px">${emp.name}</div>
    <div class="tbub"><div class="td"></div><div class="td"></div><div class="td"></div></div>`;
  box.appendChild(row); scrollDown();
}
function rmTyping(id) { document.getElementById('tp-'+id)?.remove(); }
function scrollDown() { const b = document.getElementById('msgs'); b.scrollTop = b.scrollHeight; }
function fmt(t) { return t.replace(/```(\w*)\n?([\s\S]*?)```/g,'<pre>$2</pre>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>'); }
function buildCtx() { return chatHistory.slice(-10).map(m => m.role==='user' ? `[Владелец]: ${m.content}` : `[${m.name}/${m.role}]: ${m.content}`).join('\n'); }

const kwMap = {0:['задача','план','стратегия','распредели','цель','приоритет'],1:['контент','пост','текст','копирайт','напиши','написать'],2:['автопостинг','автоматизац','расписание','n8n','make','скрипт'],3:['одежда','платье','куртка','размер','скрипт продаж'],4:['телефон','ноутбук','техника','смартфон','гаджет','iphone','samsung'],5:['заказ','доставка','статус','возврат','crm'],6:['бот','webhook','aiogram','api','интеграц','уведомлен'],7:['реклама','трафик','подписчик','посев','пиар','cpm','таргет','медиаплан'],8:['аналитик','метрик','охват','конверсия','roi','отчёт','tgstat']};

function pickRel(text) {
  const lower = text.toLowerCase();
  const scores = employees.map(e => ({e, s:(kwMap[e.id]||[]).filter(k=>lower.includes(k)).length}));
  scores.sort((a,b) => b.s-a.s);
  if (scores[0].s === 0) return [employees[0]];
  return scores.filter(x => x.s >= scores[0].s-1 && x.s > 0).slice(0,2).map(x=>x.e);
}

async function askEmp(emp, isInt=false) {
  showTyping(emp);
  const ctx = buildCtx();
  const hasKnow = emp.knowledge.length > 0;
  const prompt = `История:\n${ctx}\n\nОтветь по своей роли.${hasKnow?' Применяй обученные знания если релевантно.':''} Упоминай коллег по имени если нужна помощь. Кратко и конкретно.`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-5', max_tokens: 600, system: buildSystem(emp), messages: [{role:'user',content:prompt}] })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || (data.error ? `Ошибка: ${data.error.message}` : '...');
    rmTyping(emp.id);
    const type = isInt ? 'int' : (hasKnow && emp.knowledge.some(k=>reply.toLowerCase().includes(k.topic.toLowerCase().split(' ')[0])) ? 'learn' : 'them');
    addBub(emp, reply, type);
    chatHistory.push({role:'assistant', name:emp.name, role:emp.role, content:reply, empId:emp.id});
    gainXP(emp, 1);
    return reply;
  } catch(e) { rmTyping(emp.id); addSys('Ошибка соединения'); return null; }
}

async function sendMsg() {
  if (busy) return;
  const inp = document.getElementById('inp'); const text = inp.value.trim(); if (!text) return;
  inp.value = ''; inp.style.height = 'auto';
  busy = true; document.getElementById('sBtn').disabled = true;
  addYou(text); chatHistory.push({role:'user', content:text});
  const rel = pickRel(text);
  for (const emp of rel) {
    await delay(350);
    const reply = await askEmp(emp, false);
    if (reply) {
      const mentioned = employees.filter(e => e.id!==emp.id && reply.toLowerCase().includes(e.name.toLowerCase()));
      for (const h of mentioned.slice(0,2)) { await delay(500); await askEmp(h, true); }
    }
  }
  busy = false; document.getElementById('sBtn').disabled = false; inp.focus();
}

function handleKey(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } }
function autoH(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,90)+'px'; }
function delay(ms) { return new Promise(r=>setTimeout(r,ms)); }

function openModal(id) {
  if (id === 'modalTeach') {
    const sel = document.getElementById('teachEmp');
    sel.innerHTML = employees.map(e=>`<option value="${e.id}">${e.emoji} ${e.name} — ${e.role} (ур.${getLevelInfo(e.xp).lv})</option>`).join('');
  }
  document.getElementById(id).classList.add('open');
  setTimeout(()=>{ const f=document.querySelector(`#${id} input`); if(f) f.focus(); }, 50);
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function openTeachCard(empId) {
  teachTarget = empId;
  const emp = employees.find(e=>e.id===empId);
  document.getElementById('teachCardTitle').textContent = `Обучить ${emp.emoji} ${emp.name}`;
  document.getElementById('modalTeachCard').classList.add('open');
  setTimeout(()=>document.getElementById('teachCardTopic').focus(), 50);
}

function doTeach(emp, topic, content) {
  if (!topic || !content) return false;
  emp.knowledge.push({topic, content, date: new Date().toLocaleDateString('ru')});
  const skillWord = topic.split(' ').find(w=>w.length>4) || topic;
  if (!emp.learnedSkills.includes(skillWord)) emp.learnedSkills.push(skillWord);
  gainXP(emp, 2);
  saveState();
  const c = gc(emp.id); const li = getLevelInfo(emp.xp); const box = document.getElementById('msgs');
  const row = document.createElement('div'); row.className = 'mrow';
  row.innerHTML = `<div class="mav" style="background:${c.bg};color:${c.tc}">${emp.emoji}</div>
    <div class="mbody">
      <div class="msender">${emp.name} · ${emp.role} <span class="lv-tag">ур.${li.lv} ${li.name}</span></div>
      <div class="ltag">📚 получил новые знания</div>
      <div class="bub learn">Изучил тему <strong>${topic}</strong>. Буду применять в работе.</div>
    </div>`;
  box.appendChild(row); scrollDown();
  return true;
}

function teachEmployee() {
  const empId = parseInt(document.getElementById('teachEmp').value);
  const emp = employees.find(e=>e.id===empId);
  const topic = document.getElementById('teachTopic').value.trim();
  const content = document.getElementById('teachContent').value.trim();
  if (doTeach(emp, topic, content)) {
    closeModal('modalTeach');
    document.getElementById('teachTopic').value = '';
    document.getElementById('teachContent').value = '';
    switchTab('chat');
  }
}

function teachFromCard() {
  const emp = employees.find(e=>e.id===teachTarget);
  const topic = document.getElementById('teachCardTopic').value.trim();
  const content = document.getElementById('teachCardContent').value.trim();
  if (doTeach(emp, topic, content)) {
    closeModal('modalTeachCard');
    document.getElementById('teachCardTopic').value = '';
    document.getElementById('teachCardContent').value = '';
    renderStaff();
    switchTab('chat');
  }
}

function hireEmp() {
  const name = document.getElementById('hName').value.trim();
  const role = document.getElementById('hRole').value.trim();
  const dept = document.getElementById('hDept').value.trim() || 'Другое';
  const emoji = document.getElementById('hEmoji').value.trim() || '👤';
  const skills = document.getElementById('hSkills').value.trim().split(',').map(s=>s.trim()).filter(Boolean);
  const desc = document.getElementById('hDesc').value.trim();
  if (!name || !role) return;
  const id = Date.now();
  const allNames = employees.map(e=>e.name).join(', ');
  const baseSystem = desc || `Ты — ${name}, ${role} холдинга. В чате с командой: ${allNames}. Говори по-русски, профессионально. Выполняй задачи по специальности. До 150 слов.`;
  employees.push({id, name, role, dept, emoji, xp:0, baseSkills:skills, learnedSkills:[], knowledge:[], baseSystem, _custom:true});
  closeModal('modalHire');
  ['hName','hRole','hDept','hEmoji','hSkills','hDesc'].forEach(i=>document.getElementById(i).value='');
  saveState();
  renderSidebar(); addSys(`${emoji} ${name} (${role}) принят — уровень 1, Новичок`); switchTab('chat');
}

function resetState() {
  if (!confirm('Сбросить прогресс всей команды? XP, знания и нанятые сотрудники будут удалены.')) return;
  localStorage.removeItem(SAVE_KEY);
  location.reload();
}

function init() {
  renderSidebar();
  const hasSaved = !!localStorage.getItem(SAVE_KEY);
  setTimeout(()=>{
    addSys('Холдинг запущен — все сотрудники онлайн');
    if (hasSaved) {
      addSys('✅ Прогресс команды восстановлен из памяти');
    } else {
      addSys('Каждый ответ +1 XP · Обучение +2 XP · 5 XP = новый уровень');
    }
  }, 80);
}

if (API_KEY) init();
</script>
